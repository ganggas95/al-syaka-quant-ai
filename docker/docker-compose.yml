version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: al-syaka-postgres
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant_pass
      POSTGRES_DB: al_syaka_quant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d al_syaka_quant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: al-syaka-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
